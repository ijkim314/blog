<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하나은행 알림</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="phone-shell">
        <div class="status-bar" aria-label="상태 표시줄">
            <time datetime="09:41">9:41</time>
            <div class="status-icons" aria-hidden="true">
                <span class="cellular">
                    <i></i><i></i><i></i><i></i>
                </span>
                <span class="wifi"></span>
                <span class="battery"></span>
            </div>
        </div>

        <header class="app-header">
            <button class="brand" type="button" aria-label="김하나 메뉴">김하나 <span class="chevron"></span></button>
            <button class="close" type="button" aria-label="닫기"></button>
        </header>

        <section class="card-list" aria-label="하나은행 알림 목록">
            <article class="notice-card">
                <span class="badge badge-hot"><i class="flame">♨</i> 핫!</span>
                <h2>2차 민생회복 소비쿠폰 신청하세요</h2>
                <p>기간: 9.22(월) 9시 ~ 10.31(금) 18시</p>
                <div class="visual document-visual" aria-hidden="true">
                    <div class="document">
                        <i></i><i></i><i></i>
                    </div>
                    <div class="government-mark"><span></span></div>
                </div>
                <a class="action-button" href="#">2차 소비쿠폰 신청하기</a>
            </article>

            <article class="notice-card score-card">
                <span class="badge badge-score"><i class="gauge-mini"></i> 신용점수</span>
                <h2>대출잔액이 변경됐어요</h2>
                <p>신용점수 변동이 있는지 확인해보세요.</p>
                <div class="visual score-visual" aria-hidden="true">
                    <div class="score-dial">
                        <span class="needle"></span>
                        <span class="needle-center"></span>
                    </div>
                </div>
                <a class="action-button" href="#">신용점수 확인하기</a>
            </article>

            <article class="notice-card">
                <span class="badge badge-hot"><i class="flame">♨</i> 핫!</span>
                <h2>2차 민생회복 소비쿠폰 신청하세요</h2>
                <p>기간: 9.22(월) 9시 ~ 10.31(금) 18시</p>
                <div class="visual wallet-visual" aria-hidden="true">
                    <div class="wallet">
                        <span class="coin coin-one">₩</span>
                        <span class="coin coin-two">₩</span>
                        <span class="card-piece"></span>
                        <span class="ticket-piece"></span>
                    </div>
                </div>
                <a class="action-button" href="#">2차 소비쿠폰 신청하기</a>
            </article>
        </section>
    </main>
</body>

</html>
