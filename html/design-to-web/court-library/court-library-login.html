<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법원도서관 로그인</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="login-card">
        <header class="brand">
            <img src="court-library-logo.svg" alt="법원도서관">
        </header>

        <form class="login-form" action="#" method="post">
            <div class="form-field">
                <label for="user-id">아이디</label>
                <input id="user-vff" name="user-id" type="text" placeholder="아이디를 입력 해 주세요." autocomplete="username">
            </div>

            <div class="form-field">
                <label for="user-label">레이블</label>
                <input id="user-label" name="user-label" type="text" placeholder="입력 해 주세요.">
            </div>

            <div class="actions">
                <button class="button button-primary" type="submit">×&nbsp; 로그인 &nbsp;×</button>
                <button class="button button-secondary" type="button">×&nbsp; 담당자 변경 &nbsp;×</button>
            </div>
        </form>
    </main>
</body>

</html>
